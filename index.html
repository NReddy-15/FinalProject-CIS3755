<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- import D3 Version 6 here or at the end of the body -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/6.7.0/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/waypoints/4.0.1/noframework.waypoints.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" type="text/css" href="css/fullpage.css" />
</head>

<body>

    <div id="fullpage">
        <div class="section active">
            <div class="container">
                Books
            </div>
        </div>
        <div class="section">
            <div class="mapcontainer">
                <svg id="mapgraph">
                </svg>
            <div id="genre-panel"></div>
                Books 2
            </div>
        </div>
        <div class="section">
            <div class="container flexbox">
                <svg id="hexbin" width="1100" height="700"></svg>
                <div>
                    <div class="flexbox clearPanel">
                    <div class="innerFlex">
                        <button type="button" class="btn btn-primary btn-sm genreBtn" onclick="renderHexbin('All')">All</button>
                        <br />
                        <br />
                        <button type="button" class="btn btn-primary btn-sm genreBtn" onclick="renderHexbin('Non-Fiction')">Non-Fiction</button>
                        <br />
                        <br />
                        <button type="button" class="btn btn-primary btn-sm genreBtn" onclick="renderHexbin('Art/Literature')">Art/Literature</button>
                        <br />
                        <br />
                        <button type="button" class="btn btn-primary btn-sm genreBtn" onclick="renderHexbin('Fantasy')">Fantasy</button>
                        <br />
                        <br />
                        <button type="button" class="btn btn-primary btn-sm genreBtn" onclick="renderHexbin('Mystery/Thriller')">Mystery/Thriller</button>
                        <br />
                        <br />
                        <button type="button" class="btn btn-primary btn-sm genreBtn" onclick="renderHexbin('Romance')">Romance</button>
                    </div>
                    <div class="innerFlex">
                        <button type="button" class="btn btn-primary btn-sm genreBtn" onclick="renderHexbin('Science Fiction')">Science Fiction</button>
                        <br />
                        <br />
                        <button type="button" class="btn btn-primary btn-sm genreBtn" onclick="renderHexbin('Children')">Children</button>
                        <br />
                        <br />
                        <button type="button" class="btn btn-primary btn-sm genreBtn" onclick="renderHexbin('Horror')">Horror</button>
                        <br />
                        <br />
                        <button type="button" class="btn btn-primary btn-sm genreBtn" onclick="renderHexbin('Humor')">Humor</button>
                        <br />
                        <br />
                        <button type="button" class="btn btn-primary btn-sm genreBtn" onclick="renderHexbin('Adventure')">Adventure</button>
                        <br />
                        <br />
                        <button type="button" class="btn btn-primary btn-sm genreBtn" onclick="renderHexbin('Graphic Novels/Manga')">Graphic Novels/Manga</button>
                        <br />
                        <br />
                        <button type="button" class="btn btn-primary btn-sm genreBtn" onclick="renderHexbin('Other')">Other</button>

                    </div>
                    <!-- fantasy, mystery, history, philosophy, science fiction, romance -->
                </div>
                <div class="flexbox clearPanel">
                    Hi
                </div>
                </div>
            </div>
        </div>
        <div class="section">
            <div class="container">
                Books 4
            </div>
        </div>
    </div>


    <script src="./scrolly.js"></script>
    <script src="./js/map.js"></script>
    <script src="./dashboard.js"></script>
    <script src="./timeline.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- This following line is optional. Only necessary if you use the option css3:false and you want to use other easing effects rather than "easeInOutCubic". -->
    <!-- <script src="vendors/easings.min.js"></script> -->

    <script type="text/javascript" src="js/fullpage.js"></script>

    <script>
        new fullpage('#fullpage', {
            //options here
            autoScrolling: true,
            scrollHorizontally: true
        });
    </script>

</body>

</html>
