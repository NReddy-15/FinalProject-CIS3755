<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- import D3 Version 6 here or at the end of the body -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/6.7.0/d3.min.js"></script>
    <script src="https://d3js.org/d3-hexbin.v0.2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/waypoints/4.0.1/noframework.waypoints.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link rel="stylesheet" type="text/css" href="css/fullpage.css" />
</head>

<body>

    <div id="fullpage">
        <div class="section active">
            <div class="container">
                Books Books Books
            </div>
        </div>
        <div class="section">
            <div class="container">
                Books 2
            </div>
        </div>
        <div class="section">
            <div class="container flexbox">
                <svg id="hexbin" width="1100" height="700"></svg>
                <div>
                    <button onclick="renderHexbin('All')">All</button>
                    <br />
                    <br />
                    <button onclick="renderHexbin('Fiction')">Fiction</button>
                    <br />
                    <br />
                    <button onclick="renderHexbin('Nonfiction')">Nonfiction</button>
                </div>
            </div>
            
        </div>
        <div class="section">
            <div class="container">
                Books 4
            </div>
        </div>
    </div>


    <script src="./scrolly.js"></script>
    <script src="./map.js"></script>
    <script src="./dashboard.js"></script>
    <script src="./popularity.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <!-- This following line is optional. Only necessary if you use the option css3:false and you want to use other easing effects rather than "easeInOutCubic". -->
    <!-- <script src="vendors/easings.min.js"></script> -->

    <script type="text/javascript" src="js/fullpage.js"></script>

    <script>
        new fullpage('#fullpage', {
            //options here
            autoScrolling:true,
            scrollHorizontally: true
        });

        renderHexbin("All");
    </script>

</body>

</html>
